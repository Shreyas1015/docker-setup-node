name: CD

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

# Required permissions for pushing to GHCR
permissions:
  contents: read
  packages: write

jobs:
  # ── Build Docker image and push to GitHub Container Registry ────
  build-push:
    name: Build & Push
    runs-on: ubuntu-24.04
    outputs:
      short_sha: ${{ steps.vars.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=main-,format=short
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to EC2 via SSH ───────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-24.04
    needs: build-push
    environment: production # Requires manual approval (set in GitHub Settings)
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            cd ${{ secrets.DEPLOY_DIR }}
            bash scripts/deploy.sh "main-${{ needs.build-push.outputs.short_sha }}"

  # ── External health check + auto-rollback ───────────────────────
  verify:
    name: Health Check
    runs-on: ubuntu-24.04
    needs: deploy
    steps:
      - name: Check /health endpoint
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -sf --max-time 5 "https://${{ secrets.EC2_HOST }}/health" \
              | jq -r '.status' 2>/dev/null)
            if [ "$STATUS" = "ok" ]; then
              echo "Healthy on attempt $i"
              exit 0
            fi
            echo "Attempt $i: waiting 5s..."
            sleep 5
          done
          echo "FAILED"
          exit 1

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ${{ secrets.DEPLOY_DIR }}
            bash scripts/rollback.sh
